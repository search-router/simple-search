services:
  app:
    build: .
    image: search-service:latest
    ports:
      - "8000:8000"
    environment:
      APP_ENV: prod
      APP_CONFIG_FILE: /home/app/config.yaml
      LOG_LEVEL: INFO
      SEARCH_ROUTER_API_KEY: ${SEARCH_ROUTER_API_KEY:-}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
