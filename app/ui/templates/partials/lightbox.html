<dialog class="lightbox" id="lightbox" aria-label="image preview">
  <div data-lightbox-content style="position: relative;">
    <button type="button" class="lightbox__close" data-lightbox-close aria-label="close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true">
        <path d="M6 6l12 12M18 6l-12 12"/>
      </svg>
    </button>
    <img data-lightbox-image alt="" loading="eager">
    <div class="lightbox__meta">
      <strong data-lightbox-title dir="auto"></strong>
      <span class="muted" data-lightbox-meta></span>
      <a data-lightbox-link href="#" class="button button--secondary" target="_blank" rel="noopener noreferrer"></a>
    </div>
  </div>
</dialog>
